services:
  - type: web
    name: loto-calculator-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

  - type: web
    name: loto-calculator-frontend
    env: python
    buildCommand: echo "Frontend ready"
    startCommand: cd frontend && python -m http.server $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
